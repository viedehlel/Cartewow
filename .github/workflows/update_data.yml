name: Update data (energy + cereals + migrations)

on:
  schedule:
    - cron: "0 6 * * 0"  # Chaque dimanche à 6h UTC
  workflow_dispatch:       # Lancement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch energy data from OWID
        run: python scripts/fetch_energy.py

      - name: Fetch cereal data from UN Comtrade
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}
        run: python scripts/fetch_cereals.py

      - name: Fetch cereal production from World Bank
        run: python scripts/fetch_cereal_production.py

      - name: Fetch migration data from UNHCR
        run: python scripts/fetch_migrations.py

      - name: Install openpyxl for UN DESA script
        run: pip install openpyxl -q

      - name: Fetch economic migration data from UN DESA
        run: python scripts/fetch_migration_economic.py

      - name: Fetch arms transfer data from SIPRI
        run: python scripts/fetch_arms.py

      - name: Fetch metal trade flows from UN Comtrade
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}
        run: python scripts/fetch_metals.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/energy.json data/cereals.json data/cereal_production.json data/migrations.json data/migration_economic.json data/arms.json data/metals.json
          git diff --cached --quiet || git commit -m "Auto-update data $(date +%Y-%m-%d)"
          git push
