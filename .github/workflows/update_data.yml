name: Update cereal data

on:
  schedule:
    - cron: "0 6 * * 0"  # Chaque dimanche à 6h UTC
  workflow_dispatch:       # Lancement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch cereal data from UN Comtrade
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}
        run: python scripts/fetch_cereals.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cereals.json
          git diff --cached --quiet || git commit -m "Auto-update cereals data $(date +%Y-%m-%d)"
          git push
