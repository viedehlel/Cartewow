name: Update — Comtrade (céréales + métaux)

on:
  schedule:
    - cron: "0 6 * * 0"  # Chaque dimanche à 6h UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch cereal trade flows from UN Comtrade
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}
        run: python scripts/fetch_cereals.py

      - name: Fetch metal trade flows from UN Comtrade
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}
        run: python scripts/fetch_metals.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cereals.json data/metals.json
          git diff --cached --quiet || git commit -m "Auto-update comtrade $(date +%Y-%m-%d)"
          git push
