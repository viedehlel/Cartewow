name: Update — Énergie

on:
  schedule:
    - cron: "0 5 * * 0"  # Chaque dimanche à 5h UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch energy data from OWID
        run: python scripts/fetch_energy.py

      - name: Fetch cereal production from World Bank
        run: python scripts/fetch_cereal_production.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/energy.json data/cereal_production.json
          git diff --cached --quiet || git commit -m "Auto-update energy $(date +%Y-%m-%d)"
          git push
