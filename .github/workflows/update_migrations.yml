name: Update — Migrations

on:
  schedule:
    - cron: "0 7 * * 0"  # Chaque dimanche à 7h UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch migration data from UNHCR
        run: python scripts/fetch_migrations.py

      - name: Install openpyxl
        run: pip install openpyxl -q

      - name: Fetch economic migration data from UN DESA
        run: python scripts/fetch_migration_economic.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/migrations.json data/migration_economic.json
          git diff --cached --quiet || git commit -m "Auto-update migrations $(date +%Y-%m-%d)"
          git push
